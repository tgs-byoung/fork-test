name: Sync from template repo

on:
  workflow_dispatch:
    inputs:
      template_branch:
        description: 'Branch on template repo to sync from'
        required: false
        default: 'main'

env:
  TEMPLATE_REPO: tgs-byoung/fork-test

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TEMPLATE_REPO_PAT }}

      - name: Guard against running in the template repo
        run: |
          if [ "${{ github.repository }}" = "${{ env.TEMPLATE_REPO }}" ]; then
            echo "This workflow should not run in the template repo itself."
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "template-sync-bot"
          git config user.email "actions@github.com"

      - name: Add template remote
        run: git remote add template https://x-access-token:${{ secrets.TEMPLATE_REPO_PAT }}@github.com/${{ env.TEMPLATE_REPO }}.git

      - name: Fetch template
        run: git fetch template

      - name: Create sync branch
        run: git checkout -b sync/template-updates

      - name: Merge template changes
        id: merge
        run: |
          if git merge template/${{ github.event.inputs.template_branch }} --allow-unrelated-histories --no-edit; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            git add -A
            git commit -m "Merge template/${{ github.event.inputs.template_branch }} with conflicts (needs manual resolution)"
          fi

      - name: Push sync branch
        run: git push origin sync/template-updates --force

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.TEMPLATE_REPO_PAT }}
          branch: sync/template-updates
          delete-branch: true
          title: "Sync changes from template repo"
          body: |
            Automated sync from `${{ env.TEMPLATE_REPO }}` (branch: `${{ github.event.inputs.template_branch }}`).
            ${{ steps.merge.outputs.conflict == 'true' && '⚠️ Merge conflicts detected — resolve the conflict markers in this PR before merging.' || '' }}
          base: main
